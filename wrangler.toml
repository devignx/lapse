# Product is "Lapse" (lapse.in). The Worker + D1 keep the internal resource
# name "journal" — renaming them here creates a NEW empty Worker/DB and orphans
# the live deployment. Brand lives in the UI + the lapse.in custom domain.
name = "journal"
main = "src/worker/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "journal"
# Replace after `wrangler d1 create journal` (any value works for local dev):
database_id = "2e4c5daf-652e-4b3f-b14a-fbc8e07bfd0b"
migrations_dir = "migrations"

# Rate limiting (Workers native binding; counts are per-colo, per-IP).
# AUTH_LIMITER guards password endpoints: login, signup, authorize.
[[unsafe.bindings]]
name = "AUTH_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

# TOKEN_LIMITER guards /token (OAuth exchanges/refreshes — legit bursts possible).
[[unsafe.bindings]]
name = "TOKEN_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 20, period = 60 }

# Secrets (set via `wrangler secret put`, never committed):
#   SESSION_SECRET -> HMAC key for dashboard session cookies
