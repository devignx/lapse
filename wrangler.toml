name = "journal"
main = "src/worker/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "journal"
# Replace after `wrangler d1 create journal` (any value works for local dev):
database_id = "2e4c5daf-652e-4b3f-b14a-fbc8e07bfd0b"
migrations_dir = "migrations"

# Secrets (set via `wrangler secret put`, never committed):
#   SESSION_SECRET -> HMAC key for dashboard session cookies
